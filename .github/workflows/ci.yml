# Sequential CI: restore → lint → build → unit-test.
# Bugbot is in `.github/workflows/bugbot.yml` so it does not show in this workflow’s job list.
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}

      - name: Restore
        run: dotnet restore GeminiAgenticCodeReview.sln

  lint:
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}

      - name: Restore
        run: dotnet restore GeminiAgenticCodeReview.sln

      - name: dotnet format
        run: dotnet format GeminiAgenticCodeReview.sln --verify-no-changes --no-restore --verbosity diagnostic

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}

      - name: Restore
        run: dotnet restore GeminiAgenticCodeReview.sln

      - name: Build
        run: dotnet build GeminiAgenticCodeReview.sln --configuration Release --no-restore

      - name: Upload Release build outputs
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-release-build
          if-no-files-found: error
          path: |
            CoveReciewDotnet/bin
            CoveReciewDotnet/obj
            CoveReciewDotnet.Tests/bin
            CoveReciewDotnet.Tests/obj

  unit-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Release build outputs
        uses: actions/download-artifact@v4
        with:
          name: dotnet-release-build
          path: .

      - name: Test
        run: dotnet test GeminiAgenticCodeReview.sln --configuration Release --no-build --verbosity normal
