# Build, lint, and test on every PR and push to main.
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GeminiAgenticCodeReview.sln

      # Enforces `dotnet format` rules; fails if sources need formatting (run `dotnet format` locally to fix).
      - name: dotnet format
        run: dotnet format GeminiAgenticCodeReview.sln --verify-no-changes --no-restore --verbosity diagnostic

      - name: Build
        run: dotnet build GeminiAgenticCodeReview.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test GeminiAgenticCodeReview.sln --configuration Release --no-build --verbosity normal
