# Sequential CI: restore → lint → build → unit-test. Bugbot runs in parallel on PRs (no `needs`).
# - Required checks: `lint`, `build`, `unit-test` only—not `request-bugbot`.
# - `request-bugbot` has no dependencies and uses continue-on-error so it never blocks CI or merges.
# Bugbot docs: https://cursor.com/docs/bugbot
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  request-bugbot:
    if: github.event_name == 'pull_request'
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Trigger Bugbot
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) throw new Error("No pull_request payload");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: "bugbot run"
            });

  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}

      - name: Restore
        run: dotnet restore GeminiAgenticCodeReview.sln

  lint:
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}

      - name: Restore
        run: dotnet restore GeminiAgenticCodeReview.sln

      - name: dotnet format
        run: dotnet format GeminiAgenticCodeReview.sln --verify-no-changes --no-restore --verbosity diagnostic

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}

      - name: Restore
        run: dotnet restore GeminiAgenticCodeReview.sln

      - name: Build
        run: dotnet build GeminiAgenticCodeReview.sln --configuration Release --no-restore

      - name: Upload Release build outputs
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-release-build
          if-no-files-found: error
          path: |
            CoveReciewDotnet/bin
            CoveReciewDotnet/obj
            CoveReciewDotnet.Tests/bin
            CoveReciewDotnet.Tests/obj

  unit-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Release build outputs
        uses: actions/download-artifact@v4
        with:
          name: dotnet-release-build
          path: .

      - name: Test
        run: dotnet test GeminiAgenticCodeReview.sln --configuration Release --no-build --verbosity normal
