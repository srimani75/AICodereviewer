# Build and sanity-check the .NET project on every PR and push to main.
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CoveReciewDotnet/GeminiAgenticCodeReview.csproj

      - name: Build
        run: dotnet build CoveReciewDotnet/GeminiAgenticCodeReview.csproj --configuration Release --no-restore
