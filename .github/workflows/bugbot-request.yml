# Asks Cursor Bugbot to review the PR by posting the trigger comment.
# Requires: Cursor Bugbot GitHub app installed + repo enabled in the Bugbot dashboard.
# Docs: https://cursor.com/docs/bugbot
#
# If your dashboard already runs Bugbot on every PR update, disable this workflow
# or remove the job to avoid duplicate reviews/comments.
name: Bugbot review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

jobs:
  request-bugbot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Trigger Bugbot
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) throw new Error("No pull_request payload");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: "bugbot run"
            });
